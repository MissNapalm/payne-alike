<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>FPS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: monospace; }
    canvas { display: block; }

    /* ── shared panel style ── */
    .panel {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.78);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: #fff; gap: 14px;
    }
    .panel h1 { font-size: 2rem; letter-spacing: 6px; }
    .panel p  { font-size: 0.8rem; color: #aaa; letter-spacing: 2px; }

    .btn {
      margin-top: 6px;
      padding: 10px 32px;
      background: none;
      border: 1px solid #fff;
      color: #fff;
      font-family: monospace;
      font-size: 0.85rem;
      letter-spacing: 4px;
      cursor: pointer;
    }
    .btn:hover { background: rgba(255,255,255,0.12); }

    /* ── start overlay ── */
    #overlay { z-index: 20; }

    /* ── ESC menu ── */
    #esc-menu { z-index: 30; display: none; }
    #esc-menu h1 { font-size: 1.4rem; letter-spacing: 8px; margin-bottom: 8px; }

    .setting-row {
      display: flex; align-items: center; gap: 16px;
      font-size: 0.8rem; letter-spacing: 2px; color: #ccc;
    }
    .setting-row label { width: 160px; text-align: right; }
    .setting-row input[type=range] {
      width: 180px; accent-color: #fff; cursor: pointer;
    }
    .setting-row span { width: 40px; color: #fff; }

    /* ── bullet time ── */
    #bt-overlay {
      position: fixed; inset: 0;
      background: rgba(10, 30, 100, 0.22);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      z-index: 5;
    }
    #bt-hud {
      position: fixed;
      bottom: 52px; left: 50%;
      transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 5px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      z-index: 6;
    }
    #bt-label {
      font-size: 0.6rem; letter-spacing: 4px; color: #88aaff;
    }
    #bt-track {
      width: 140px; height: 3px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(100,150,255,0.4);
    }
    #bt-fill {
      height: 100%; background: #88aaff; width: 100%;
    }

    /* ── crosshair ── */
    #crosshair {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
    #crosshair::before, #crosshair::after {
      content: ''; position: absolute; background: #fff;
    }
    #crosshair::before { width: 2px; height: 12px; top: -6px;  left: -1px; }
    #crosshair::after  { width: 12px; height: 2px; top:  -1px; left: -6px; }
  </style>
</head>
<body>

  <div id="overlay" class="panel">
    <h1>FPS</h1>
    <p>WASD — MOVE &nbsp;|&nbsp; MOUSE — LOOK &nbsp;|&nbsp; SPACE — JUMP (×2)</p>
    <p>CLICK — SHOOT &nbsp;|&nbsp; Q — BULLET TIME &nbsp;|&nbsp; ESC — MENU</p>
    <button class="btn" id="start-btn">CLICK TO START</button>
  </div>

  <div id="esc-menu" class="panel">
    <h1>PAUSED</h1>
    <div class="setting-row">
      <label>MOUSE SENSITIVITY</label>
      <input type="range" id="sens-slider" min="0.5" max="5" step="0.1" value="2" />
      <span id="sens-val">2.0</span>
    </div>
    <div class="setting-row">
      <label>CAMERA DISTANCE</label>
      <input type="range" id="camdist-slider" min="1.5" max="8" step="0.1" value="4" />
      <span id="camdist-val">4.0</span>
    </div>
    <div class="setting-row">
      <label>CAMERA ANGLE</label>
      <input type="range" id="camangle-slider" min="-0.5" max="1.3" step="0.05" value="0.18" />
      <span id="camangle-val">0.18</span>
    </div>
    <button class="btn" id="resume-btn">RESUME</button>
  </div>

  <div id="bt-overlay"></div>
  <div id="bt-hud">
    <div id="bt-label">BULLET TIME</div>
    <div id="bt-track"><div id="bt-fill"></div></div>
  </div>
  <div id="crosshair"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
